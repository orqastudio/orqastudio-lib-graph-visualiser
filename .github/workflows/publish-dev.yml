name: Publish Dev

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@orqastudio"
      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build

      - name: Set dev version
        run: npm version 0.1.0-dev --no-git-tag-version --allow-same-version

      - name: Publish with dev tag
        run: npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
